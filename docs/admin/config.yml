# Decap CMS — https://decapcms.org/
# If you use GitHub Pages, you need an OAuth proxy. See admin/OAUTH-SETUP.md
# and uncomment the two backend lines below (base_url + auth_endpoint) after
# the proxy is live.

backend:
  name: github
  branch: main
  repo: hanserino/curatedrunningpodcasts
  # OAuth proxy (Cloudflare Worker) — see admin/OAUTH-SETUP.md
  base_url: https://curatedrunningpodcasts-decap-oauth.bestpodcasts.workers.dev
  auth_endpoint: /auth
  # use_graphql: true   # optional, fewer API calls to GitHub

# Optional: for local only — run: npx decap-server
# and keep base_url / auth lines commented, or use a test backend
# local_backend: true

# Leading "/" = repo root. Without it, collection media is stored next to each entry
# (e.g. _posts/podcasts/) while public_folder still inserts /media/... — broken on site.
media_folder: "/media"
public_folder: "/media"
slug:
  clean_accents: true
  encoding: "ascii"
  max_length: 100

editor:
  preview: false

collections:
  - name: "podcast"
    label: "Podcast"
    label_singular: "podcast"
    description: "Curated show entries. Filenames are YYYY-MM-DD-slug.md to match Jekyll."
    folder: "_posts/podcasts"
    # Must match global: /media = absolute in repo (see top-level media_folder comment)
    media_folder: "/media"
    public_folder: "/media"
    create: true
    path: "{{year}}-{{month}}-{{day}}-{{slug}}.md"
    extension: "md"
    format: "frontmatter"
    # Slug in filename = slugified title unless you set slug in (future) advanced mode
    identifier_field: title
    summary: "{{title}} · {{date}}"
    sortable_fields: ["date", "title", "description"]
    fields:
      - { label: "Publish date", name: "date", required: true, time_format: false, date_format: "YYYY-MM-DD", picker_utc: false, widget: "datetime" }
      - { label: "Show / podcast name", name: "title", required: true, widget: "string" }
      - { label: "Category (fixed)", name: "category", default: "podcast", widget: "hidden" }
      - { label: "Include in site (fixed)", name: "published", default: "true", widget: "hidden" }
      - { label: "Short description", name: "description", required: false, hint: "Shown in the list and in SEO. One or two sentences.", widget: "text" }
      - { label: "Publisher", name: "publisher", required: false, widget: "string" }
      - { label: "Spotify (show or episode URL)", name: "spotify_link", required: false, widget: "string" }
      - { label: "Apple Podcasts", name: "apple_podcast_link", required: false, widget: "string" }
      - { label: "Patreon", name: "patreon_link", required: false, widget: "string" }
      - { label: "YouTube", name: "youtube_link", required: false, widget: "string" }
      - label: "Running type (tags)"
        name: "tags"
        required: true
        widget: "select"
        multiple: true
        min: 1
        options: ["track", "trail", "subultra", "ultra", "skyrunning", "science", "road", "business"]
        hint: "One or more — used by the category filter on the site."
      - label: "Language(s) spoken"
        name: "language"
        required: true
        widget: "select"
        multiple: true
        min: 1
        options: ["norwegian", "english", "swedish", "polish", "italian", "french", "danish"]
        hint: "One or more — used by the language filter."
      - label: "Body (markdown)"
        name: "body"
        required: true
        widget: "markdown"
        media_folder: "/media"
        public_folder: "/media"
        hint: "Use the image button so the inserted path starts with /media/ (required on this site). Same pattern as other podcast posts."
