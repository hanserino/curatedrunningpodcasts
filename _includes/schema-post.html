{%- assign desc = page.description | default: page.excerpt | strip_html | strip -%}
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@graph": [
    {
      "@type": "BreadcrumbList",
      "itemListElement": [
        { "@type": "ListItem", "position": 1, "name": "Home", "item": {{ site.url | jsonify }} },
        { "@type": "ListItem", "position": 2, "name": {{ page.title | jsonify }}, "item": {{ page.url | absolute_url | jsonify }} }
      ]
    },
    {
      "@type": "PodcastSeries",
      "@id": {{ page.url | absolute_url | append: "#show" | jsonify }},
      "name": {{ page.title | jsonify }},
      "description": {{ desc | jsonify }},
      "url": {{ page.url | absolute_url | jsonify }}
{%- if page.publisher -%}
      ,"author": { "@type": "Organization", "name": {{ page.publisher | jsonify }} }
{%- endif -%}
{%- if page.spotify_link or page.apple_podcast_link or page.youtube_link or page.patreon_link -%}
      ,"sameAs": [
{%- if page.spotify_link -%}{{ page.spotify_link | jsonify }}{%- endif -%}
{%- if page.apple_podcast_link -%}{% if page.spotify_link %}, {% endif %}{{ page.apple_podcast_link | jsonify }}{%- endif -%}
{%- if page.youtube_link -%}{% if page.spotify_link or page.apple_podcast_link %}, {% endif %}{{ page.youtube_link | jsonify }}{%- endif -%}
{%- if page.patreon_link -%}{% if page.spotify_link or page.apple_podcast_link or page.youtube_link %}, {% endif %}{{ page.patreon_link | jsonify }}{%- endif -%}
      ]
{%- endif -%}
{%- if page.language and page.language.size > 0 -%}
      ,"inLanguage": [
{%- for l in page.language -%}
        {{ l | jsonify }}{% unless forloop.last %}, {% endunless %}
{%- endfor -%}
      ]
{%- else -%}
      ,"inLanguage": "en"
{%- endif -%}
    }
  ]
}
</script>
