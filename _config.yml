baseurl: ''
url: 'https://bestrunningpodcasts.com'
destination: docs
# Must exclude the build output from the source tree, or Jekyll re-reads stale
# docs/*.html (e.g. after jekyll serve) and you get wrong absolute URLs in meta.
exclude:
  - docs
  - tools
email: hans@naerdetalvor.no
# Used for <title>, Open Graph, JSON-LD, and LLM-oriented summaries
title: The Best Running Podcasts
heading: The Best Running Podcasts
# Home page hero line under the h1 (Markdown; *text* = emphasis)
header_tagline: "A hand picked selection of *running related podcasts* worth listening to on your long run."
tagline: The best running podcasts, trail, ultra, and track podcast directory
description: >
  An independent, hand-curated directory of the best running podcasts—road, track, trail, ultra, skyrunning, and training science.
  Each entry is reviewed for quality and usefulness for runners, coaches, and fans. Filter by training focus and language, discover Spotify and Apple Podcasts links, and find shows worth your long run.
markdown: kramdown
kramdown:
  input: GFM
  syntax_highlighter: rouge
# Organization / publisher (Schema.org, meta). `author` is also used by jekyll-feed (Atom/RSS).
author:
  name: Hans Kristian Smedsrød Engdahl
  email: hans@naerdetalvor.no
org_name: NEDA
org_url: "https://www.naerdetalvor.no"
lang: en
plugins:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-redirect-from
sass:
  sass_dir: _style
  style: compressed
defaults:
  - scope:
      path: ''
      type: posts
    values:
      published: 'true'
      layout: post
      permalink: /:slug.html

# Browser CMS: https://decapcms.org/ — admin UI at /admin/ (build output: docs/admin/).
# Prose.io is deprecated; the old "prose:" config has been removed. Set up GitHub
# sign-in: see admin/OAUTH-SETUP.md
